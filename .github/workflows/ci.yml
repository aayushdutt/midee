name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Each verification step runs independently so a single failure
      # doesn't mask the others — when a PR breaks both lint and tests we
      # want to see both diagnostics in one CI run, not have to push a fix
      # and wait again to discover the next failure.
      #
      # Strategy:
      #   · typecheck + test + build all use `continue-on-error` so the
      #     job keeps marching, then a final gate step fails if any of
      #     them did. They still show as red in the step list — just
      #     don't short-circuit the run.
      #   · lint is treated as a *warning*: continue-on-error AND it does
      #     not contribute to the final gate. Style nits shouldn't block
      #     a merge; their value is the inline annotation on the PR.

      - id: typecheck
        run: npm run typecheck
        continue-on-error: true

      - id: lint
        run: npm run lint
        continue-on-error: true

      - id: test
        run: npm run test
        continue-on-error: true

      - id: build
        run: npm run build
        continue-on-error: true

      # Hard gate — fail the job if any of the *blocking* checks failed.
      # Lint is intentionally excluded here so style issues stay visible
      # in the run but never block a merge.
      - name: Verify required checks
        if: always()
        run: |
          fail=0
          for step in typecheck test build; do
            outcome="${{ steps.typecheck.outcome }}"
            case "$step" in
              typecheck) outcome="${{ steps.typecheck.outcome }}" ;;
              test)      outcome="${{ steps.test.outcome }}" ;;
              build)     outcome="${{ steps.build.outcome }}" ;;
            esac
            if [ "$outcome" != "success" ]; then
              echo "::error::$step failed (outcome=$outcome)"
              fail=1
            fi
          done
          if [ "${{ steps.lint.outcome }}" != "success" ]; then
            echo "::warning::lint reported issues (non-blocking)"
          fi
          exit $fail

  # Playwright e2e (Tier 3). Runs only the CODEC-FREE suite that works on GitHub's
  # Linux Chromium — playback, live-input (held-key + the BUG-2 expected-fail), and
  # the WebCodecs *presence* spike. Anything needing proprietary encoders (AV +
  # audio-only export, real-encode/H.264/AAC asserts) or simultaneous multi-key
  # timing (chord) is gated behind E2E_HEAVY, because GitHub's Linux Chromium ships
  # no H.264/AAC encoders. Run the full suite locally/nightly with
  # `npm run test:e2e:heavy` (macOS Chromium has the codecs). Lean `vite build`
  # webServer + `retries: 1`; this subset is reliable enough to be BLOCKING.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Cache the downloaded Chromium build across runs (keyed on the Playwright
      # version in the lockfile) so we don't re-download ~150MB every run.
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      # Install the full Chromium build (NOT headless-shell) — the export path
      # needs real WebCodecs encoders. On a cache hit, restore the binary and
      # install only the OS deps; otherwise download the browser + deps.
      - run: npx playwright install --with-deps chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
      - run: npx playwright install-deps chromium
        if: steps.pw-cache.outputs.cache-hit == 'true'
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
